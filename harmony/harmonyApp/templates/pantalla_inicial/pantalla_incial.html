{% load static %}

<!DOCTYPE html>
<html>

<head>
    <link rel="icon" href="{% static 'images/icono.png' %}" type="image/x-icon">

    <title>Pantalla inicial</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous">
    </script>
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
</head>

<style>
    .header {
        text-align: center;
        padding: 2%;
    }

    #body {
        background-color: #F1F0EC;
    }

    #cont_grande {
        padding-top: 1%;
    }

    #texto_incial {
        padding-top: 7%;
        padding-bottom: 14%;
        text-align: center;
        font-style: normal;
        font-size: 30px;

    }

    #cont-button {
        display: flex;
        padding: 2%;
        justify-content: center;
        align-items: center;
        gap: 10px;
        text-decoration: none; /* Elimina la decoración de texto (subrayado) */

    }

    #button {
        width: 80%;
        border-radius: 19px;
        background: #3853FF;
        box-shadow: 0px 4px 4px 0px rgba(0, 0, 0, 0.30);
        align-items: center;
        justify-content: center;
        display: flex;

    }

    #text_button {
        margin: 4%;
        color: #FFF;
        /* Tamaño de letra relativo al ancho del botón */
        text-align: center;
        font-style: normal;
        font-weight: 400;
        line-height: normal;
        width: 100%;
        font-size: x-large;
    }
    #cont_port_cont_img{
        
        height: 111%;
        border-radius: 19px;
        background: rgba(198, 195, 195, 0.48);
    

    }
    #port_cont_img {
        position: relative;
        z-index: -1;
        border-radius: 19px;
        height: 100%;
        width: 100%;
        overflow: hidden; 
        background: #DCD7D7;
        margin-left: 20px;
        box-shadow: 0px 4px 4px 0px rgba(0, 0, 0, 0.50);
        padding-bottom: 50%;
    }

    .svg-element1 {
        position: absolute;
        top: 0;
        left: 0;
    }

    .svg-element2 {
        position: absolute;
        top: 0;
        right: 0;
    }
    .svg-element4 {
        position: absolute;
        left: 0;
    }
    .svg-element5 {
        position: absolute;
        left: 0;
        
    }
    .svg-element6 {
        position: absolute;
        right: 0;
        
    }
    .svg-element7 {
        position: absolute;
        left: 0;
    }
    .svg-element8 {
        position: absolute;
        bottom:  0;
    }
    .svg-element9 {
        position: absolute;
        bottom:  0;
        
       
    }
  
    #titulo {
        text-align: center;
    }

    
    #logoNavbar {
        position: absolute;
        justify-content: center;
        padding: 1px;
        height: 250px;
        width: 250px;
        bottom: 0;
    }
    
    
</style>

</head>

<body id="body">
    <header class="header">

    </header>      
        <section class="vh-70">
          <div class="container-fluid h-custom">
            <div class="row d-flex justify-content-center align-items-center h-100">
              <div class="col-md-9 col-lg-6 col-xl-5">
                <img src="{% static 'images/woman_working_computer.png'  %}"
                  class="img-fluid" alt="Sample image">
              </div>
              <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
                  <div class="d-flex flex-row align-items-center justify-content-center justify-content-lg-start">
                    <img src="{% static '/images/nuevo_logo.png' %}" style="width: 100%;">
                  </div>
                  <div class="d-flex flex-row align-items-center text-center justify-content-center">
                    <br>
                    <h4> Bienvenid@<br> ¡Nos complace tenerte aquí! </h4>
                  </div>
                  
                  <!-- Email input -->
                  <div class="form-outline mb-4">
                    <a id="cont-button" href="{% url 'pantalla_login' %}">
                      <button class="btn" id="button">
                          <p id="text_button"> Iniciar sesión </p>
                      </button>
                    </a>
                  </div>
        
                  <!-- Password input -->
                  <div class="form-outline mb-3">
                    <a id="cont-button">
                      <button class="btn" id="button" data-bs-toggle="modal" data-bs-target="#largeModal">
                          <p id="text_button"> Registrarse </p>
                      </button>
                  </a>
                  </div>
              </div>
            </div>
          </div>
        </section>

        <div class="modal-dialog modal-lg">
            <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Crear una Cuenta</h3>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formulario" method="POST" action="{% url 'pantalla_registro' %}"
                enctype="multipart/form-data" >
            
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col form-outline md-6">
                        <div>
                            <label for="id_nombre" class="form-label">Nombre:</label>
                            <input type="text" class="form-control" id="id_nombre" name="nombre"
                                aria-describedby="emailHelp" placeholder="Nombre">
                        </div>
                    </div>
                    <div class="col form-outline md-6">
                        <div>
                            <label for="id_apellido" class="form-label">Apellido:</label>
                            <input type="text" class="form-control" id="id_apellido" name="apellido"
                                aria-describedby="emailHelp" placeholder="Apellido">
                        </div>
                    </div>
                </div>
                
                <div class="form-outline mb-9">
                    <div>
                        <label for="id_correo" class="form-label">Correo electrónico:</label>
                        <input type="email" class="form-control" id="id_correo" name="correo"
                    aria-describedby="emailHelp" placeholder="usuario@gmail.com">
                    </div>
                </div>
                <div class="row g-3">
                    <div class="col form-outline mb-9">
                        <div>
                            <label for="id_clave" class="form-label">Contraseña:</label>
                            <input type="password" class="form-control" id="id_clave" name="clave"
                        aria-describedby="emailHelp">
                        </div>
                    </div>
                    <div class="col form-outline mb-9">
                        <div>
                            <label for="id_clave_doble" class="form-label">Vuelve a escribir la contraseña:</label>
                        <input type="password" class="form-control" id="id_clave_doble" name="clave_doble"
                        aria-describedby="emailHelp">
                        </div>
                    </div>
                </div>
                <div class="row g-3">
                    
                <div class="form-outline mb-9">
                    <div>
                        <label for="id_genero" class="form-label">Género:</label>
                        <select class="form-control" id="id_genero" name="genero">
                            <option value="" disabled selected>Selecciona tu género</option>
                            <option value="H">Hombre</option>
                            <option value="M">Mujer</option>
                        </select>
                    </div>
                </div>
                <div class="col form-outline mb-9">
                    <div>
                        <label for="id_fecha_nacimiento" class="form-label">Cuando naciste:</label><br>
                        <label style="font-size: 12px;" for="id_fecha_nacimiento" class="form-label">(Recuerda que debes ser mayor de 14 años)</label>
                        <input type="date" class="form-control" id="id_fecha_nacimiento" name="fecha_nacimiento"
                    aria-describedby="emailHelp">
                    </div>
                </div>
                </div>
                
                <div class="col form-outline mb-9">
                    <div>
                        <label for="imagen_perfil_label" class="form-label">¿Deseas subir una imagen tuya?</label>
                        <br>
                        <input type="file" id="imagen_perfil" name="imagen_perfil" accept="image/png, image/jpeg">
                        <script>
                          const uploadField = document.getElementById("imagen_perfil");

                          uploadField.onchange = function() {
                              if(this.files[0].size > 2097152) {
                              alert("El archivo no puede exceder los 2 MB!");
                              this.value = "";
                              }
                          };
                      </script>
                    </div>
                </div>
                

                <div class="form-outline mb-4">
                    
                <div class="buttons"></div>
                <div id="cont_button" class="action_btn">
                    <button id="boton1" type="submit" class="btn btn-primary" id="custom-register-button" >
                        Registrarme 
                    </button>
                    <div style="width: 100px;">

                    </div>
                    <p id="saved"></p>
                </div>
                </div>
            </form>
            </div>
            </div>
            </div>
        </div>
    </div><!-- End Large Modal-->
</body>

</html>
